# Refresco automático del índice — LISTO PERO DESACTIVADO.
#
# Reingiere todas las fuentes (sources.d/*.json) y regenera el índice público
# (SIN cédula). El despliegue será con VERCEL (pendiente de configurar).
#
# Hoy solo corre manual (botón "Run workflow"). NO corre en automático: el
# bloque `schedule` está comentado a propósito.
#
# PARA ACTIVARLO cuando haya varias plataformas integradas:
#   1) Descomenta el bloque `schedule`.
#   2) Conecta el despliegue: lo más simple es crear un Deploy Hook en Vercel y
#      descomentar el paso final para que este Action lo dispare (Vercel
#      reconstruye corriendo run.py). Guarda el hook en Settings → Secrets.
name: Refresco del índice (desactivado)

on:
  workflow_dispatch:        # por ahora: solo manual
  # schedule:
  #   - cron: "*/5 * * * *"  # cada 5 minutos — DESCOMENTAR para activar

jobs:
  refrescar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generar índice público (sin cédula)
        run: python3 run.py --export web/data.json
      # - name: Disparar redepliegue en Vercel (pendiente de configurar)
      #   run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
